name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
        continue-on-error: true  # ESLint warnings should not block (te paktene per momentin)

      - name: Tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Placeholder env vars per build (jo secrets reale)
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
          VITE_SITE_URL: https://rentcars.life
          # Versioni i release-it qe lidhet me Sentry (commit SHA)
          VITE_APP_VERSION: ${{ github.sha }}
          # Sentry source maps upload — aktiv vetem nese secrets jane configured
          # Vendos ne GitHub: Settings → Secrets → Actions:
          #   SENTRY_AUTH_TOKEN, SENTRY_ORG, SENTRY_PROJECT
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Check build output size
        run: |
          echo "## Build output sizes" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          du -sh dist/* >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build (production)
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
          VITE_SITE_URL: http://localhost:4173

      - name: Pre-flight — verify dist served properly
        run: |
          echo "## Dist contents:" >> $GITHUB_STEP_SUMMARY
          ls -la dist/assets/ | head -20 >> $GITHUB_STEP_SUMMARY || true
          # Start preview server in background
          (npx vite preview --port 4174 --host 127.0.0.1 --strictPort &) > /tmp/preview.log 2>&1
          sleep 4
          echo "## Curl homepage HTML (first 1500 chars):" >> $GITHUB_STEP_SUMMARY
          echo '```html' >> $GITHUB_STEP_SUMMARY
          curl -s http://127.0.0.1:4174/ | head -c 1500 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Extract main JS path and check it
          JS=$(curl -s http://127.0.0.1:4174/ | grep -oP 'src="\K/assets/index-[A-Za-z0-9_-]+\.js' | head -1)
          echo "## Main JS path: $JS" >> $GITHUB_STEP_SUMMARY
          echo "## First 500 chars of main JS:" >> $GITHUB_STEP_SUMMARY
          echo '```js' >> $GITHUB_STEP_SUMMARY
          curl -s "http://127.0.0.1:4174${JS}" | head -c 500 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Cleanup
          pkill -f "vite preview" || true
          sleep 1

      - name: Manual boot debug — chromium captures everything
        run: |
          (npx vite preview --port 4175 --host 127.0.0.1 --strictPort &) > /tmp/preview-debug.log 2>&1
          sleep 5
          DEBUG_URL=http://127.0.0.1:4175/ node scripts/debug-app-boot.mjs 2>&1 | tee debug-app-boot.log
          echo "===== Preview server log ====="
          cat /tmp/preview-debug.log || true
          pkill -f "vite preview" || true
          sleep 1

      - name: Run Playwright smoke tests
        run: npx playwright test --project=chromium
        env:
          CI: 'true'

      - name: Dump failure artifacts to log
        if: failure()
        run: |
          echo "===== test-results contents ====="
          find test-results/ -type f 2>/dev/null | head -50 || true
          echo ""
          echo "===== error-context.md files ====="
          find test-results/ -name "error-context.md" -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null || true
          echo ""
          echo "===== Test stderr (if recorded) ====="
          find test-results/ -name "*.txt" -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null | head -200 || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: |
            debug-output.json
            debug-app-boot.log
          retention-days: 7
          if-no-files-found: ignore

  migrations-validate:
    name: Validate Supabase migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check migrations are SQL files
        run: |
          if ls supabase/migrations/*.sql 1> /dev/null 2>&1; then
            echo "Gjet $(ls supabase/migrations/*.sql | wc -l) migration files"
          else
            echo "Asnje migration file nuk u gjet"
            exit 1
          fi

      - name: Verify migration filenames pattern
        run: |
          for f in supabase/migrations/*.sql; do
            filename=$(basename "$f")
            if ! [[ "$filename" =~ ^[0-9]{14}_[a-z0-9_]+\.sql$ ]]; then
              echo "::error file=$f::Migration filename nuk respekton pattern-in YYYYMMDDHHMMSS_snake_case.sql"
              exit 1
            fi
          done
          echo "Te gjitha migrations respektojne pattern-in"
