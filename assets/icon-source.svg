<!--
🔒 PROTECTED FILE — DO NOT DELETE OR REVERT

Source SVG per gjenerimin e te gjitha ikonave (PWA + Capacitor).
Eshte 1024x1024 me background blue + ikon makine ne mes.

Per te regjeneruar PNGs: `node scripts/generate-icons.cjs`
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background — rounded square me gradient blu -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066ff" />
      <stop offset="100%" stop-color="#0052cc" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background fill (full canvas — Android maskable do shton padding vetë) -->
  <rect width="1024" height="1024" fill="url(#bgGradient)" rx="220"/>

  <!-- Letter "R" + car indicator — Inspired nga lucide Car icon -->
  <g transform="translate(512, 512)" filter="url(#shadow)">
    <!-- Car body (top) — me kornize te rrumbullaket -->
    <path
      d="M -240 -40
         L -240 -160
         Q -240 -200, -200 -200
         L -100 -200
         L -60 -260
         L 60 -260
         L 100 -200
         L 200 -200
         Q 240 -200, 240 -160
         L 240 -40
         Z"
      fill="white"
      opacity="0.95"
    />

    <!-- Windshield -->
    <path
      d="M -100 -200
         L -60 -260
         L 60 -260
         L 100 -200
         Z"
      fill="#0066ff"
      opacity="0.4"
    />

    <!-- Car bottom + chassis -->
    <rect x="-260" y="-60" width="520" height="160" rx="40" fill="white" />

    <!-- Headlight glow accent (top-left) -->
    <circle cx="-200" cy="-20" r="12" fill="#fbbf24" />
    <!-- Tail light (top-right) -->
    <circle cx="200" cy="-20" r="12" fill="#ef4444" />

    <!-- Wheels (front + rear) -->
    <circle cx="-160" cy="100" r="60" fill="#1a1a1a" />
    <circle cx="-160" cy="100" r="32" fill="#404040" />
    <circle cx="-160" cy="100" r="16" fill="#1a1a1a" />

    <circle cx="160" cy="100" r="60" fill="#1a1a1a" />
    <circle cx="160" cy="100" r="32" fill="#404040" />
    <circle cx="160" cy="100" r="16" fill="#1a1a1a" />

    <!-- Brand letter "R" small badge -->
    <circle cx="0" cy="-100" r="30" fill="#0066ff" />
    <text x="0" y="-100" text-anchor="middle" dominant-baseline="central"
          font-family="Inter, Arial, sans-serif" font-weight="900" font-size="40" fill="white">R</text>
  </g>
</svg>
