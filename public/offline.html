<!doctype html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pa internet — RentaKar</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f9fafb;
      color: #111827;
      padding: 1rem;
    }
    .container {
      text-align: center;
      max-width: 24rem;
    }
    .icon {
      width: 4rem;
      height: 4rem;
      margin: 0 auto 1rem;
      background: #fee2e2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 0.5rem;
    }
    p {
      color: #6b7280;
      margin: 0 0 1.5rem;
    }
    button {
      background: #0066ff;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.875rem;
    }
    button:hover { background: #0052cc; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Nuk keni internet</h1>
    <p>Kontrolloni lidhjen tuaj dhe provoni perseri.</p>
    <button onclick="window.location.reload()">Provo perseri</button>
  </div>
</body>
</html>
